<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companions - ParlerLUX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');
    .serif { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="bg-[#0A3D2A] text-white">

  <!-- Navigation (sama seperti index) -->
  <!-- Paste navigation code di atas di sini -->

  <section class="pt-24 pb-20">
    <div class="max-w-7xl mx-auto px-6">
      <h1 class="text-5xl md:text-6xl serif text-center">Meet Our Companions</h1>
      <p class="text-center text-white/70 mt-4 text-lg">Carefully selected. Deeply kind. Highly intelligent.</p>

      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mt-16">
        <!-- Companion Card 1 -->
        <div class="bg-white/5 border border-white/10 rounded-3xl overflow-hidden">
          <div class="h-80 bg-gradient-to-br from-amber-300/20 to-white/5 flex items-center justify-center">
            <span class="text-6xl text-white/30">👤</span>
          </div>
          <div class="p-6">
            <h3 class="text-2xl serif">Marie Laurent</h3>
            <p class="text-[#C9A66B]">42 • French • English • German</p>
            <p class="mt-3 text-white/70">Former diplomat. Loves philosophy, travel, and deep conversation about life transitions.</p>
            <button class="mt-6 w-full bg-[#C9A66B] text-[#0A3D2A] py-4 rounded-2xl font-medium">Start Conversation →</button>
          </div>
        </div>

        <!-- Tambahkan 2-3 card lain sesuai contoh di atas -->
      </div>
